<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝔅𝔯𝔦𝔰𝔞𝔰 𝔡𝔢𝔩 𝔐𝔞𝔯🐟</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color:white;
    overflow-x: hidden;
}

/* 🔥 TOP BAR RESPONSIVE */
.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:15px 20px;
    background: rgba(2,6,23,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
    border-bottom:1px solid rgba(30,41,59,0.5);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.logo{
    font-size: 18px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
}

.role-badge{
    background: linear-gradient(45deg, #22c55e, #16a34a);
    padding:8px 15px;
    border-radius:25px;
    font-size:14px;
    font-weight:600;
    box-shadow: 0 4px 15px rgba(34,197,94,0.4);
}

.role-badge.cocinero{
    background: linear-gradient(45deg, #3b82f6, #1d4ed8);
    box-shadow: 0 4px 15px rgba(59,130,246,0.4);
}

.role-badge.dueno{
    background: linear-gradient(45deg, #f59e0b, #d97706);
    box-shadow: 0 4px 15px rgba(245,158,11,0.4);
}

/* PANTALLAS */
.page{
    display:none;
    min-height:100vh;
    padding-top:80px;
    padding-bottom: 20px;
}
.active{display:block;}

/* LOGIN MODERNO */
.login{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url('https://api.dix.lat/media/img_1776131911102_jbdcIitE5.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    padding:20px;
}

.login-box{
    width:100%;
    max-width:380px;
    background:rgba(30,41,59,0.95);
    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);
    padding:40px 30px;
    border-radius:25px;
    text-align:center;
    color:white;
    box-shadow:0 20px 60px rgba(0,0,0,0.7);
    border:1px solid rgba(255,255,255,0.1);
    animation: slideIn 0.6s ease-out;
}

@keyframes slideIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

.login-box h2{
    margin-bottom:25px;
    font-size:28px;
    background: linear-gradient(45deg, #22c55e, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

input{
    width:100%;
    padding:18px 20px;
    margin:15px 0;
    border:none;
    border-radius:15px;
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:16px;
    backdrop-filter:blur(10px);
    transition: all 0.3s ease;
}

input::placeholder{
    color:rgba(255,255,255,0.7);
}

input:focus{
    outline:none;
    background:rgba(255,255,255,0.2);
    box-shadow:0 0 0 3px rgba(34,197,94,0.3);
    transform: scale(1.02);
}

/* BOTONES MODERNOS */
button{
    width:100%;
    padding:18px;
    margin:10px 0;
    border:none;
    border-radius:15px;
    background: linear-gradient(45deg, #22c55e, #16a34a);
    color:white;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    transition: all 0.3s ease;
    box-shadow:0 8px 25px rgba(34,197,94,0.4);
}

button:hover{
    transform: translateY(-3px);
    box-shadow:0 12px 35px rgba(34,197,94,0.6);
}

button:active{
    transform: translateY(-1px);
}

/* HERO RESPONSIVE */
.hero{
    height:100vh;
    background: linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092');
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero h1{
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    margin-bottom:40px;
    background: linear-gradient(45deg, #ffffff, #22c55e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 30px rgba(255,255,255,0.5);
}

/* MENU GRID RESPONSIVE */
.menu{
    padding:30px 20px;
    max-width:1200px;
    margin:0 auto;
}

.menu h2{
    text-align:center;
    margin:30px 0 50px;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    background: linear-gradient(45deg, #22c55e, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.card-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 25px;
    margin-top: 40px;
}

.card{
    background: rgba(30,41,59,0.8);
    backdrop-filter:blur(15px);
    padding:30px 25px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.1);
    transition: all 0.4s ease;
    position:relative;
    overflow:hidden;
}

.card::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:4px;
    background: linear-gradient(90deg, #22c55e, #3b82f6, #f59e0b);
}

.card:hover{
    transform: translateY(-10px);
    box-shadow:0 25px 50px rgba(0,0,0,0.4);
    background: rgba(30,41,59,0.95);
}

.card h3{
    font-size:24px;
    margin-bottom:10px;
    color:#22c55e;
}

.card p{
    font-size:22px;
    font-weight:700;
    color:#f59e0b;
    margin-bottom:15px;
}

.status{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 20px;
    border-radius:25px;
    margin:15px 0;
    font-weight:600;
    font-size:14px;
}

.available{
    background: linear-gradient(45deg, #22c55e, #16a34a);
    box-shadow:0 4px 15px rgba(34,197,94,0.4);
}

.soldout{
    background: linear-gradient(45deg, #ef4444, #dc2626);
    box-shadow:0 4px 15px rgba(239,68,68,0.4);
}

.toggle{
    display: block;
    background: linear-gradient(45deg, #f59e0b, #d97706);
    margin:10px 0;
    padding:12px;
    font-size:14px;
}

.order-btn{
    background: linear-gradient(45deg, #3b82f6, #1d4ed8) !important;
    box-shadow:0 8px 25px rgba(59,130,246,0.4) !important;
}

/* PANEL COCINA */
.panel{
    padding:30px 20px;
    background: linear-gradient(135deg, #020617 0%, #1e293b 100%);
    max-width:800px;
    margin:0 auto;
}

.panel h2{
    text-align:center;
    margin-bottom:40px;
    font-size:2.5rem;
    background: linear-gradient(45deg, #22c55e, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.pedido{
    background: rgba(51,65,85,0.9);
    backdrop-filter:blur(15px);
    padding:25px;
    margin-bottom:20px;
    border-radius:20px;
    border-left:5px solid #22c55e;
    transition: all 0.3s ease;
    animation: slideInUp 0.5s ease-out;
}

@keyframes slideInUp{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

.pedido:hover{
    transform: translateX(10px);
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.pedido b{
    color:#22c55e;
    font-size:20px;
}

.pedido div{
    margin:8px 0;
    display:flex;
    align-items:center;
    gap:10px;
    font-size:16px;
}

.delete-btn{
    background: linear-gradient(45deg, #ef4444, #dc2626) !important;
    width:auto !important;
    padding:10px 20px !important;
    margin-top:15px;
    font-size:14px;
}

/* MODAL RESPONSIVE */
#modalPago{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background:rgba(0,0,0,0.9);
    backdrop-filter:blur(10px);
    justify-content:center;
    align-items:center;
    z-index:2000;
    padding:20px;
    animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

.modal-box{
    background:rgba(30,41,59,0.98);
    backdrop-filter:blur(25px);
    padding:40px 30px;
    border-radius:25px;
    text-align:center;
    width:100%;
    max-width:400px;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 30px 80px rgba(0,0,0,0.8);
}

.modal-box h3{
    color:#22c55e;
    margin-bottom:15px;
    font-size:22px;
}

.modal-box h2{
    background: linear-gradient(45deg, #22c55e, #16a34a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size:32px;
    margin:20px 0;
    letter-spacing: 3px;
}

/* TOAST MEJORADO */
.toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background: linear-gradient(45deg, #22c55e, #16a34a);
    padding:20px 30px;
    border-radius:50px;
    display:none;
    font-weight:600;
    box-shadow:0 15px 40px rgba(34,197,94,0.5);
    border:1px solid rgba(255,255,255,0.2);
    min-width:300px;
    text-align:center;
}

/* RESPONSIVE EXTREMO */
@media (max-width: 480px) {
    .topbar{padding:12px 15px;}
    .hero h1{font-size:2.2rem;}
    .card-grid{grid-template-columns:1fr; gap:20px;}
    .menu{padding:20px 15px;}
    .panel{padding:20px 15px;}
    .pedido{padding:20px;}
}

@media (max-height: 600px) {
    .hero{height:90vh;}
    .page{padding-top:70px;}
}

/* ANIMACIONES SUAVES */
*{
    scroll-behavior: smooth;
}

/* LOADING SPINNER */
.loading{
    display:inline-block;
    width:20px;
    height:20px;
    border:3px solid rgba(255,255,255,0.3);
    border-radius:50%;
    border-top-color:#22c55e;
    animation: spin 1s ease-in-out infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}
</style>
</head>
